<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOAL — Resolver Parciais</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-0: #0d1117; --bg-1: #161b22; --bg-2: #21262d; --bg-3: #30363d;
      --fg-0: #f0f6fc; --fg-1: #c9d1d9; --fg-2: #8b949e; --fg-3: #6e7681;
      --green: #2ea043; --yellow: #d29922; --red: #f85149; --blue: #58a6ff;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'SF Mono', Consolas, monospace;
      --radius: 10px;
    }
    body {
      font-family: var(--sans); background: var(--bg-0); color: var(--fg-1);
      min-height: 100vh; line-height: 1.5; padding-bottom: 80px;
    }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(22,27,34,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--bg-3); padding: 14px 16px;
    }
    .header h1 { font-size: 16px; color: var(--fg-0); font-weight: 700; }
    .header-sub { font-size: 12px; color: var(--fg-3); margin-top: 2px; }
    .header-progress { margin-top: 10px; display: flex; align-items: center; gap: 10px; }
    .progress-bar { flex: 1; height: 6px; background: var(--bg-3); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .4s ease; }
    .progress-label { font-size: 12px; color: var(--fg-2); font-family: var(--mono); white-space: nowrap; }
    .container { max-width: 720px; margin: 0 auto; padding: 12px; }
    .person-section { margin-top: 16px; border: 1px solid var(--bg-3); border-radius: var(--radius); overflow: hidden; background: var(--bg-1); }
    .person-header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; cursor: pointer; user-select: none; background: var(--bg-1); transition: background .15s; }
    .person-header:hover { background: var(--bg-2); }
    .person-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--bg-0); flex-shrink: 0; }
    .person-info { flex: 1; min-width: 0; }
    .person-name { font-size: 15px; font-weight: 600; color: var(--fg-0); }
    .person-role { font-size: 12px; color: var(--fg-3); }
    .person-badge { font-size: 11px; font-family: var(--mono); padding: 3px 8px; border-radius: 12px; font-weight: 600; white-space: nowrap; }
    .badge-pending { background: rgba(210,153,34,.15); color: var(--yellow); }
    .badge-done { background: rgba(46,160,67,.15); color: var(--green); }
    .person-chevron { font-size: 12px; color: var(--fg-3); transition: transform .2s; flex-shrink: 0; }
    .person-section.open .person-chevron { transform: rotate(180deg); }
    .person-body { display: none; border-top: 1px solid var(--bg-2); }
    .person-section.open .person-body { display: block; }
    .entity-group { padding: 14px 16px; border-bottom: 1px solid var(--bg-2); }
    .entity-group:last-child { border-bottom: none; }
    .entity-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-family: var(--mono); font-weight: 600; padding: 3px 8px; border-radius: 4px; background: rgba(88,166,255,.12); color: var(--blue); margin-bottom: 4px; }
    .entity-intro { font-size: 12px; color: var(--fg-3); margin-bottom: 4px; line-height: 1.4; }
    .priority-alta { color: var(--red); }
    .priority-media { color: var(--yellow); }
    .field { margin-top: 12px; }
    .field:first-of-type { margin-top: 8px; }
    .field-label { font-size: 13px; color: var(--fg-2); margin-bottom: 5px; }
    .field-hint { font-size: 11px; color: var(--fg-3); margin-top: 3px; line-height: 1.4; }
    .field-divider { font-size: 13px; font-weight: 600; color: var(--fg-0); margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--bg-2); }
    input[type="text"], input[type="tel"], input[type="email"], textarea, select {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--bg-3); background: var(--bg-2);
      color: var(--fg-0); font-size: 15px; font-family: var(--sans);
      outline: none; transition: border-color .15s; -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 70px; line-height: 1.4; }
    select { cursor: pointer; }
    input::placeholder, textarea::placeholder { color: var(--fg-3); }
    .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(22,27,34,.95); backdrop-filter: blur(12px); border-top: 1px solid var(--bg-3); padding: 12px 16px; display: flex; gap: 10px; z-index: 100; }
    .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--sans); transition: all .15s; }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-primary:hover { background: #3fb950; }
    .btn-secondary { background: var(--bg-2); color: var(--fg-1); border: 1px solid var(--bg-3); }
    .btn-secondary:hover { background: var(--bg-3); }
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); padding: 16px; overflow-y: auto; }
    .modal-overlay.show { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: var(--bg-1); border: 1px solid var(--bg-3); border-radius: var(--radius); width: 100%; max-width: 640px; margin-top: 40px; overflow: hidden; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--bg-2); }
    .modal-header h2 { font-size: 15px; color: var(--fg-0); }
    .modal-close { background: none; border: none; color: var(--fg-3); font-size: 20px; cursor: pointer; padding: 4px 8px; }
    .modal-body { padding: 16px; }
    .modal-output { background: var(--bg-0); border: 1px solid var(--bg-2); border-radius: 8px; padding: 14px; font-family: var(--mono); font-size: 12px; color: var(--fg-1); line-height: 1.6; white-space: pre-wrap; max-height: 50vh; overflow-y: auto; }
    .modal-actions { padding: 12px 16px; border-top: 1px solid var(--bg-2); display: flex; gap: 8px; }
    @media (max-width: 480px) { .contact-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="header">
  <h1>SOAL — Resolver Parciais</h1>

  <div class="header-progress">

<div class="container" id="sections"></div>

<div class="footer">

// ─── State ───────────────────────────────────────────────────────────────────

var state = {};
var totalFields = 0;

function getInputFields() {
  var fields = [];
  PEOPLE.forEach(function(p) {
    p.entities.forEach(function(e) {
      e.fields.forEach(function(f) {
        if (f.type !== 'divider') fields.push(f);
      });
    });
  });
  return fields;
}

function initState() {
  var fields = getInputFields();
  totalFields = fields.length;
  fields.forEach(function(f) {
    var saved = localStorage.getItem('soal_' + f.id);
    state[f.id] = saved || '';
  });
}

function saveField(id, value) {
  state[id] = value;
  localStorage.setItem('soal_' + id, value);
  updateProgress();
}

// ─── DOM helpers ─────────────────────────────────────────────────────────────

function el(tag, className) {
  var e = document.createElement(tag);
  if (className) e.className = className;
  return e;
}

function txt(text) { return document.createTextNode(text); }

// ─── Render ──────────────────────────────────────────────────────────────────

function render() {
  var container = document.getElementById('sections');
  container.textContent = '';

  PEOPLE.forEach(function(p) {
    var section = el('div', 'person-section');
    section.id = 'sec-' + p.id;

    var filledCount = countFilled(p);
    var totalCount = countTotal(p);
    var allDone = filledCount === totalCount && totalCount > 0;

    // Header
    var header = el('div', 'person-header');

    var avatar = el('div', 'person-avatar');
    avatar.style.background = p.color;
    avatar.textContent = p.name.charAt(0);
    header.appendChild(avatar);

    var info = el('div', 'person-info');
    var nameEl = el('div', 'person-name');
    nameEl.textContent = p.name;
    info.appendChild(nameEl);
    var roleEl = el('div', 'person-role');
    roleEl.textContent = p.role;
    info.appendChild(roleEl);
    header.appendChild(info);

    var badge = el('span', 'person-badge ' + (allDone ? 'badge-done' : 'badge-pending'));
    badge.textContent = filledCount + '/' + totalCount;
    header.appendChild(badge);

    var chevron = el('span', 'person-chevron');
    chevron.textContent = '\u25BC';
    header.appendChild(chevron);

    header.addEventListener('click', function() {
      section.classList.toggle('open');
    });
    section.appendChild(header);

    // Body
    var body = el('div', 'person-body');

    p.entities.forEach(function(ent) {
      var group = el('div', 'entity-group');

      // Tag line
      var tagEl = el('div', 'entity-tag');
      var dot = el('span', 'priority-' + ent.priority);
      dot.textContent = '\u25CF';
      tagEl.appendChild(dot);
      tagEl.appendChild(txt(' ' + ent.tag + ' '));
      var pLabel = el('span');
      pLabel.style.opacity = '.5';
      pLabel.textContent = ent.priority.toUpperCase();
      tagEl.appendChild(pLabel);
      group.appendChild(tagEl);

      // Intro
      if (ent.intro) {
        var introEl = el('div', 'entity-intro');
        introEl.textContent = ent.intro;
        group.appendChild(introEl);
      }

      // Fields
      ent.fields.forEach(function(f) {
        if (f.type === 'divider') {
          var divider = el('div', 'field-divider');
          divider.textContent = f.label;
          group.appendChild(divider);
          return;
        }

        var fieldDiv = el('div', 'field');

        var label = el('div', 'field-label');
        label.textContent = f.label;
        fieldDiv.appendChild(label);

        var input;
        if (f.type === 'textarea') {
          input = document.createElement('textarea');
          input.placeholder = f.placeholder || '';
          input.value = state[f.id] || '';
          input.addEventListener('input', (function(fid) {
            return function() { saveField(fid, this.value); };
          })(f.id));
        } else if (f.type === 'select') {
          input = document.createElement('select');
          f.options.forEach(function(opt) {
            var option = document.createElement('option');
            option.value = opt;
            option.textContent = opt || '\u2014 selecionar \u2014';
            if (state[f.id] === opt) option.selected = true;
            input.appendChild(option);
          });
          input.addEventListener('change', (function(fid) {
            return function() { saveField(fid, this.value); };
          })(f.id));
        } else {
          input = document.createElement('input');
          input.type = f.type;
          input.placeholder = f.placeholder || '';
          input.value = state[f.id] || '';
          input.addEventListener('input', (function(fid) {
            return function() { saveField(fid, this.value); };
          })(f.id));
        }
        input.id = 'f_' + f.id;
        fieldDiv.appendChild(input);

        if (f.hint) {
          var hint = el('div', 'field-hint');
          hint.textContent = f.hint;
          fieldDiv.appendChild(hint);
        }

        group.appendChild(fieldDiv);
      });

      body.appendChild(group);
    });

    section.appendChild(body);
    container.appendChild(section);
  });

  updateProgress();
}

// ─── Progress ────────────────────────────────────────────────────────────────

function countFilled(person) {
  var c = 0;
  person.entities.forEach(function(e) {
    e.fields.forEach(function(f) {
      if (f.type !== 'divider' && state[f.id] && state[f.id].trim()) c++;
    });
  });
  return c;
}

function countTotal(person) {
  var c = 0;
  person.entities.forEach(function(e) {
    e.fields.forEach(function(f) {
      if (f.type !== 'divider') c++;
    });
  });
  return c;
}

function updateProgress() {
  var filled = 0;
  Object.keys(state).forEach(function(k) {
    if (state[k] && state[k].trim()) filled++;
  });
  var pct = totalFields > 0 ? (filled / totalFields * 100) : 0;
  document.getElementById('globalProgress').style.width = pct + '%';
  document.getElementById('globalLabel').textContent = filled + ' / ' + totalFields + ' campos';

  PEOPLE.forEach(function(p) {
    var sec = document.getElementById('sec-' + p.id);
    if (!sec) return;
    var badge = sec.querySelector('.person-badge');
    var f = countFilled(p), t = countTotal(p);
    badge.textContent = f + '/' + t;
    badge.className = 'person-badge ' + (f === t && t > 0 ? 'badge-done' : 'badge-pending');
  });
}

// ─── Summary ─────────────────────────────────────────────────────────────────

function generateSummary() {
  var lines = [];
  lines.push('SOAL \u2014 DADOS COLETADOS PARA RESOLVER PARCIAIS');
  lines.push('Data: ' + new Date().toLocaleDateString('pt-BR'));
  lines.push('='.repeat(50));

  var anyFilled = false;

  PEOPLE.forEach(function(p) {
    var personLines = [];

    p.entities.forEach(function(e) {
      var entityLines = [];
      e.fields.forEach(function(f) {
        if (f.type === 'divider') return;
        var val = state[f.id] ? state[f.id].trim() : '';
        if (!val) return;
        entityLines.push('  ' + f.label + ': ' + val);
      });
      if (entityLines.length > 0) {
        personLines.push('');
        personLines.push('  [' + e.tag + ']');
        personLines = personLines.concat(entityLines);
      }
    });

    if (personLines.length > 0) {
      anyFilled = true;
      lines.push('');
      lines.push('--- ' + p.name.toUpperCase() + ' (' + p.role + ') ---');
      lines = lines.concat(personLines);
    }
  });

  if (!anyFilled) {
    lines.push('');
    lines.push('(Nenhum campo preenchido ainda)');
  }

  var pending = [];
  PEOPLE.forEach(function(p) {
    p.entities.forEach(function(e) {
      e.fields.forEach(function(f) {
        if (f.type === 'divider') return;
        var val = state[f.id] ? state[f.id].trim() : '';
        if (!val) pending.push(p.name + ' > ' + f.label);
      });
    });
  });

  if (pending.length > 0 && anyFilled) {
    lines.push('');
    lines.push('='.repeat(50));
    lines.push('CAMPOS PENDENTES (' + pending.length + '):');
    pending.forEach(function(item) {
      lines.push('  [ ] ' + item);
    });
  }

  return lines.join('\n');
}

function showSummary() {
  document.getElementById('modalOutput').textContent = generateSummary();
  document.getElementById('modal').classList.add('show');
  document.getElementById('copyBtn').textContent = 'Copiar';
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function copySummary() {
  var text = document.getElementById('modalOutput').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = 'Copiado!';
    setTimeout(function() { btn.textContent = 'Copiar'; }, 2000);
  });
}

function resetAll() {
  if (!confirm('Limpar TODOS os campos preenchidos?')) return;
  Object.keys(state).forEach(function(k) {
    state[k] = '';
    localStorage.removeItem('soal_' + k);
  });
  render();
}

// ─── Event listeners ─────────────────────────────────────────────────────────

document.getElementById('btnReset').addEventListener('click', resetAll);
document.getElementById('btnSummary').addEventListener('click', showSummary);
document.getElementById('btnModalClose').addEventListener('click', closeModal);
document.getElementById('btnModalClose2').addEventListener('click', closeModal);
document.getElementById('copyBtn').addEventListener('click', copySummary);

// ─── Init ────────────────────────────────────────────────────────────────────

initState();
render();
</script>
</body>
