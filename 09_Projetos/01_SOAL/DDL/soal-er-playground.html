<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOAL ER Playground</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e2422;--bg2:#262c2a;--bg3:#313836;--bg4:#424a47;
  --fg:#d4dbd6;--fg2:#8a9a8c;--fg3:#5c6b5e;
  --accent:#4caf7c;--green:#4caf7c;--yellow:#d4a63c;--red:#e05a50;--orange:#d47a3a;
  --radius:8px;--shadow:0 2px 8px rgba(0,0,0,.35);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;
  --mono:'SF Mono','Fira Code','Cascadia Code',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.4;display:flex;flex-direction:column}

.header{background:var(--bg2);border-bottom:1px solid var(--bg4);padding:.75rem 1.25rem;display:flex;align-items:center;gap:1rem;flex-shrink:0;z-index:100}
.header h1{font-size:1.15rem;font-weight:700;letter-spacing:-.02em;white-space:nowrap}
.header h1 span{color:var(--accent)}
.header-stats{display:flex;gap:.75rem;margin-left:auto;flex-wrap:wrap}
.stat{background:var(--bg3);font-size:.72rem;padding:.2rem .6rem;border-radius:12px;font-family:var(--mono);color:var(--fg2);white-space:nowrap}
.stat b{color:var(--fg);font-weight:600}

.main{display:flex;flex:1;overflow:hidden}

.left-panel{width:220px;background:var(--bg2);border-right:1px solid var(--bg4);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.left-panel h3{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--fg3);padding:.75rem .75rem .35rem;font-weight:600}
.search-box{margin:.25rem .5rem .5rem;background:var(--bg);border:1px solid var(--bg4);border-radius:var(--radius);color:var(--fg);font-size:.82rem;padding:.45rem .6rem;outline:none;font-family:var(--font);width:calc(100% - 1rem)}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--fg3)}

.layer-list{list-style:none;padding:0 .5rem}
.layer-item{display:flex;align-items:center;gap:.5rem;padding:.35rem .25rem;cursor:pointer;border-radius:4px;font-size:.82rem;transition:background .15s}
.layer-item:hover{background:var(--bg3)}
.layer-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.layer-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.layer-count{font-family:var(--mono);font-size:.7rem;color:var(--fg3)}
.layer-item.off{opacity:.35}
.layer-item.off .layer-dot{background:var(--fg3)!important}

.left-section{padding:.5rem .75rem;border-top:1px solid var(--bg4);font-size:.78rem;color:var(--fg2)}
.left-section kbd{background:var(--bg3);border:1px solid var(--bg4);border-radius:3px;padding:0 .3rem;font-size:.7rem;font-family:var(--mono)}

.canvas-wrap{flex:1;position:relative;overflow:hidden;background:var(--bg)}
canvas{display:block;width:100%;height:100%}
.canvas-hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(38,44,42,.85);color:var(--fg3);font-size:.72rem;padding:.3rem .8rem;border-radius:12px;pointer-events:none;transition:opacity .5s}

.right-panel{width:0;background:var(--bg2);border-left:1px solid var(--bg4);overflow-y:auto;overflow-x:hidden;transition:width .25s ease;flex-shrink:0}
.right-panel.open{width:360px}
.rp-header{display:flex;align-items:center;gap:.5rem;padding:.75rem;border-bottom:1px solid var(--bg4);position:sticky;top:0;background:var(--bg2);z-index:10}
.rp-title{font-weight:700;font-size:.95rem;flex:1;font-family:var(--mono)}
.rp-badge{font-size:.65rem;padding:.15rem .5rem;border-radius:10px;font-weight:600;text-transform:uppercase}
.rp-close{background:none;border:none;color:var(--fg2);cursor:pointer;font-size:1.1rem;padding:.2rem .4rem;border-radius:4px;line-height:1}
.rp-close:hover{background:var(--bg3);color:var(--fg)}

.rp-section{padding:.6rem .75rem;border-bottom:1px solid var(--bg3)}
.rp-section h4{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--fg3);margin-bottom:.4rem;font-weight:600}
.rp-meta{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.4rem}
.pill{display:inline-block;font-size:.68rem;font-weight:600;padding:.15rem .55rem;border-radius:12px;white-space:nowrap}
.pill-completo{background:rgba(76,175,124,.15);color:var(--green)}
.pill-parcial{background:rgba(212,166,60,.15);color:var(--yellow)}
.pill-sem_dados{background:rgba(92,107,94,.15);color:var(--fg3)}

.rp-col-table{width:100%;font-size:.78rem;border-collapse:collapse}
.rp-col-table th{text-align:left;color:var(--fg3);font-weight:600;font-size:.68rem;text-transform:uppercase;padding:.3rem .25rem;border-bottom:1px solid var(--bg4)}
.rp-col-table td{padding:.25rem .25rem;border-bottom:1px solid rgba(48,54,61,.5);font-family:var(--mono);font-size:.75rem}
.rp-col-table tr.org-row{opacity:.35}
.flag{font-size:.65rem;padding:.1rem .3rem;border-radius:3px;margin-left:.2rem;display:inline-block}
.flag-pk{background:rgba(76,175,124,.15);color:var(--accent)}
.flag-fk{background:rgba(212,122,58,.15);color:var(--orange)}
.flag-enum{background:rgba(212,166,60,.15);color:var(--yellow)}

.rp-enum{margin-bottom:.4rem}
.rp-enum-name{font-family:var(--mono);font-size:.78rem;color:var(--yellow);font-weight:600}
.rp-enum-vals{font-size:.72rem;color:var(--fg2);margin-top:.15rem;line-height:1.5}

.rp-rel{display:flex;align-items:center;gap:.4rem;padding:.3rem .25rem;cursor:pointer;border-radius:4px;font-size:.78rem;transition:background .12s}
.rp-rel:hover{background:var(--bg3)}
.rp-rel-arrow{color:var(--fg3);font-size:.7rem;flex-shrink:0}
.rp-rel-name{font-family:var(--mono);color:var(--accent);font-weight:500}
.rp-rel-col{color:var(--fg3);font-size:.7rem}
</style>
</head>

<!-- PASSWORD GATE -->
<div id="authGate" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center">
  <div style="text-align:center;max-width:320px">
    <h1 style="font-size:1.4rem;margin-bottom:.3rem;color:var(--fg)">SOAL <span style="color:var(--accent)">ER Playground</span></h1>
    <p style="color:var(--fg3);font-size:.82rem;margin-bottom:1.5rem">DeepWork AI Flows</p>
    <input id="authPass" type="password" placeholder="Senha de acesso" autofocus
      style="width:100%;padding:.65rem .8rem;border:1px solid var(--bg4);border-radius:var(--radius);background:var(--bg2);color:var(--fg);font-size:.9rem;font-family:var(--font);outline:none;text-align:center">
    <button id="authBtn" style="width:100%;margin-top:.6rem;padding:.55rem;border:none;border-radius:var(--radius);background:var(--accent);color:#fff;font-size:.85rem;font-weight:600;cursor:pointer;font-family:var(--font)">Entrar</button>
    <p id="authErr" style="color:var(--red);font-size:.75rem;margin-top:.5rem;display:none">Senha incorreta</p>
  </div>
</div>
<script>
(function(){
  var hash="458a4d09";
  function simpleHash(s){var h=0;for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return(h>>>0).toString(16);}
  function unlock(){
    document.getElementById("authGate").style.display="none";
    sessionStorage.setItem("soal_auth","1");
  }
  function tryAuth(){
    var v=document.getElementById("authPass").value;
    if(simpleHash(v)===hash){ unlock(); }
    else { document.getElementById("authErr").style.display="block"; document.getElementById("authPass").value=""; }
  }
  if(sessionStorage.getItem("soal_auth")==="1") unlock();
  document.getElementById("authBtn").onclick=tryAuth;
  document.getElementById("authPass").onkeydown=function(e){if(e.key==="Enter")tryAuth();};
})();
</script>

<div class="header">

    <h3>Camadas</h3>
    <ul class="layer-list" id="layerList"></ul>

      <div><kbd>F</kbd> Fit all</div>
      <div><kbd>Esc</kbd> Fechar painel</div>
      <div><kbd>Space</kbd> Reset zoom</div>
      <div style="margin-top:.5rem;color:var(--fg3);font-size:.72rem">Scroll = zoom | Drag = pan/move</div>

  </div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="canvas-hint" id="canvasHint">Scroll para zoom | Drag para mover | Click para detalhes</div>
  </div>

  <div class="right-panel" id="rightPanel">
    <div id="rpContent"></div>
  </div>
</div>
</div><!-- /appContent -->

var entMap = {};
ENTITIES.forEach(function(e){ e.enums = e.enums || []; e.inEdges = []; e.outEdges = []; entMap[e.id] = e; });
EDGES.forEach(function(ed){ var f=entMap[ed.from], t=entMap[ed.to]; if(f) f.outEdges.push(ed); if(t) t.inEdges.push(ed); });

var layerVisible = {};
LAYERS.forEach(function(l){ layerVisible[l.key] = true; });

var NODE_W=160, HEADER_H=24, ROW_H=16, PAD=6, MAX_ROWS=6;
function getNodeH(e){ var fks=e.cols.filter(function(c){return c.fk&&c.col!=="organization_id";}); return HEADER_H + Math.min(1+fks.length, MAX_ROWS)*ROW_H + PAD; }

// Deterministic grid layout — no physics, no overlap
var dragNode=null;
(function(){
  var GAP_X = 220; // horizontal space between node left edges
  var GAP_Y = 400; // vertical space between layer rows
  var SPLIT_GAP = 300; // horizontal gap between left/right split pairs

  // Init all entities dimensions first
  ENTITIES.forEach(function(e){ e.w=NODE_W; e.h=getNodeH(e); e.vx=0; e.vy=0; });

  // Group by layer
  var byLayer = {};
  LAYERS.forEach(function(l){byLayer[l.key]=[];});
  ENTITIES.forEach(function(e){byLayer[e.layer].push(e);});

  // Assign rows: layers sharing same y form a split row (left | gap | right)
  // Row 0: sistema (y=0)
  // Row 1: territorial (y=350)
  // Row 2: operacional (y=700)
  // Row 3: insumos (left) + op_campo (right) (y=1100)
  // Row 4: ubg (y=1500)
  // Row 5: financeiro (left) + frete_vendas (right) (y=1900)
  // Row 6: auxiliar (y=2300)

  function layoutRow(ents, centerX, yBase){
    var totalW = ents.length * GAP_X - (GAP_X - NODE_W);
    var startX = centerX - totalW/2;
    ents.forEach(function(e,i){
      e.x = startX + i * GAP_X;
      e.y = yBase;
    });
  }

  function layoutSplitRow(entsLeft, entsRight, yBase){
    // Left group ends at -SPLIT_GAP/2, right group starts at +SPLIT_GAP/2
    var leftW = entsLeft.length * GAP_X - (GAP_X - NODE_W);
    var rightW = entsRight.length * GAP_X - (GAP_X - NODE_W);
    var leftStart = -SPLIT_GAP/2 - leftW;
    var rightStart = SPLIT_GAP/2;
    entsLeft.forEach(function(e,i){
      e.x = leftStart + i * GAP_X;
      e.y = yBase;
    });
    entsRight.forEach(function(e,i){
      e.x = rightStart + i * GAP_X;
      e.y = yBase;
    });
  }

  // Full-width layers centered at x=0
  layoutRow(byLayer["sistema"], 0, 0);
  layoutRow(byLayer["territorial"], 0, GAP_Y);
  layoutRow(byLayer["operacional"], 0, GAP_Y*2);

  // Split row: insumos (left) + op_campo (right)
  layoutSplitRow(byLayer["insumos"], byLayer["op_campo"], GAP_Y*3);

  // Full-width
  layoutRow(byLayer["ubg"], 0, GAP_Y*4);

  // Split row: financeiro (left) + frete_vendas (right)
  layoutSplitRow(byLayer["financeiro"], byLayer["frete_vendas"], GAP_Y*5);

  // Full-width
  layoutRow(byLayer["auxiliar"], 0, GAP_Y*6);
})();

// CANVAS
// ═══════════════════════════════════════════════════
var canvas=document.getElementById("canvas"), ctx=canvas.getContext("2d");
var W,H,dpr, panX=0, panY=0, zoom=1;
var selectedNode=null, hoverNode=null, searchQuery="";
var monoFont="'SF Mono','Fira Code','Cascadia Code',monospace";

function resize(){
  dpr=window.devicePixelRatio||1;
  var wrap=canvas.parentElement;
  W=wrap.clientWidth; H=wrap.clientHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  canvas.style.width=W+"px"; canvas.style.height=H+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener("resize",function(){resize();draw();});
resize();

function screenToWorld(sx,sy){return[(sx-W/2)/zoom-panX,(sy-H/2)/zoom-panY];}

function draw(){
  ctx.save(); ctx.clearRect(0,0,W,H);
  ctx.translate(W/2,H/2); ctx.scale(zoom,zoom); ctx.translate(panX,panY);

  var active=selectedNode||hoverNode, searching=searchQuery.length>0;

  // Edges
  EDGES.forEach(function(ed){
    var a=entMap[ed.from], b=entMap[ed.to];
    if(!a||!b||!layerVisible[a.layer]||!layerVisible[b.layer]) return;
    var hl=active&&(a===active||b===active);
    ctx.beginPath();
    ctx.strokeStyle=hl?"rgba(76,175,124,0.7)":(active?"rgba(92,107,94,0.1)":"rgba(92,107,94,0.3)");
    ctx.lineWidth=hl?1.8:0.8;
    if(a===b){
      ctx.ellipse(a.x+a.w/2,a.y-20,25,18,0,0,Math.PI*2);
    } else {
      var ax=a.x+a.w/2,ay=a.y+a.h/2,bx=b.x+b.w/2,by=b.y+b.h/2;
      var mx=(ax+bx)/2,my=(ay+by)/2,ddx=bx-ax,ddy=by-ay;
      var cpx=mx+ddy*0.1, cpy=my-ddx*0.1;
      ctx.moveTo(ax,ay); ctx.quadraticCurveTo(cpx,cpy,bx,by);
      var t=0.92, px=(1-t)*(1-t)*ax+2*(1-t)*t*cpx+t*t*bx, py=(1-t)*(1-t)*ay+2*(1-t)*t*cpy+t*t*by;
      var ang=Math.atan2(by-py,bx-px);
      ctx.moveTo(bx,by); ctx.lineTo(bx-8*Math.cos(ang-.3),by-8*Math.sin(ang-.3));
      ctx.moveTo(bx,by); ctx.lineTo(bx-8*Math.cos(ang+.3),by-8*Math.sin(ang+.3));
    }
    ctx.stroke();
    if(zoom>1.5&&hl&&a!==b){
      ctx.font="9px "+monoFont; ctx.fillStyle="rgba(138,154,140,0.7)"; ctx.textAlign="center";
      ctx.fillText(ed.col,(a.x+a.w/2+b.x+b.w/2)/2,(a.y+a.h/2+b.y+b.h/2)/2-6);
    }
  });

  // Nodes
  ENTITIES.forEach(function(e){
    if(!layerVisible[e.layer]) return;
    var layer=layerMap[e.layer], isSel=e===selectedNode, isHov=e===hoverNode;
    var conn=active&&isConnected(e);
    var matchS=searching&&e.name.toLowerCase().indexOf(searchQuery)>=0;
    ctx.globalAlpha=(searching&&!matchS)?0.15:((active&&!conn&&!isSel)?0.2:1);

    if(isSel||isHov){
      ctx.strokeStyle=isSel?"#4caf7c":"rgba(76,175,124,0.5)";
      ctx.lineWidth=isSel?2.5:1.5;
      ctx.strokeRect(e.x-3,e.y-3,e.w+6,e.h+6);
    }

    // Body
    ctx.fillStyle="#262c2a"; ctx.beginPath(); rr(ctx,e.x,e.y,e.w,e.h,6); ctx.fill();
    ctx.strokeStyle=(conn||isSel)?"rgba(76,175,124,0.5)":"rgba(66,74,71,0.8)"; ctx.lineWidth=1; ctx.stroke();

    // Header
    ctx.fillStyle=layer.color; ctx.beginPath(); rrTop(ctx,e.x,e.y,e.w,HEADER_H,6); ctx.fill();
    ctx.fillStyle="#1e2422"; ctx.font="bold 10px "+monoFont; ctx.textAlign="left"; ctx.textBaseline="middle";
    ctx.fillText(e.name,e.x+6,e.y+HEADER_H/2,e.w-12);

    // PK + FK
    ctx.font="9px "+monoFont;
    var row=0, pkC=e.cols.find(function(c){return c.pk;});
    if(pkC){ ctx.fillStyle="#4caf7c"; ctx.fillText("\u{1F511} "+pkC.col,e.x+6,e.y+HEADER_H+8+row*ROW_H,e.w-12); row++; }
    var fks=e.cols.filter(function(c){return c.fk&&c.col!=="organization_id";});
    fks.slice(0,MAX_ROWS-1).forEach(function(c){
      ctx.fillStyle="#d47a3a"; ctx.fillText("\u2192 "+c.fk,e.x+6,e.y+HEADER_H+8+row*ROW_H,e.w-12); row++;
    });
    if(fks.length>MAX_ROWS-1){ ctx.fillStyle="#8a9a8c"; ctx.fillText("... +"+(fks.length-MAX_ROWS+1)+" FKs",e.x+6,e.y+HEADER_H+8+row*ROW_H,e.w-12); }
    ctx.globalAlpha=1;
  });
  ctx.restore();
}

function isConnected(ent){
  var ref=selectedNode||hoverNode; if(!ref) return false; if(ent===ref) return true;
  return EDGES.some(function(e){return(e.from===ref.id&&e.to===ent.id)||(e.to===ref.id&&e.from===ent.id);});
}
function rr(c,x,y,w,h,r){c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}
function rrTop(c,x,y,w,h,r){c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.lineTo(x+w,y+h);c.lineTo(x,y+h);c.arcTo(x,y,x+w,y,r);c.closePath();}

// ═══════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════
var isDragging=false, isPanning=false, dragStartX=0, dragStartY=0, lastMX=0, lastMY=0, didMove=false;

function hitTest(sx,sy){
  var w=screenToWorld(sx,sy), wx=w[0], wy=w[1];
  for(var i=ENTITIES.length-1;i>=0;i--){
    var e=ENTITIES[i]; if(!layerVisible[e.layer]) continue;
    if(wx>=e.x&&wx<=e.x+e.w&&wy>=e.y&&wy<=e.y+e.h) return e;
  }
  return null;
}

canvas.addEventListener("mousedown",function(ev){
  lastMX=ev.clientX; lastMY=ev.clientY; dragStartX=ev.clientX; dragStartY=ev.clientY; didMove=false;
  var hit=hitTest(ev.offsetX,ev.offsetY);
  if(hit){ dragNode=hit; isDragging=true; } else { isPanning=true; }
  document.getElementById("canvasHint").style.opacity="0";
});

canvas.addEventListener("mousemove",function(ev){
  var dx=ev.clientX-lastMX, dy=ev.clientY-lastMY;
  lastMX=ev.clientX; lastMY=ev.clientY;
  if(Math.abs(ev.clientX-dragStartX)+Math.abs(ev.clientY-dragStartY)>4) didMove=true;
  if(isDragging&&dragNode){ dragNode.x+=dx/zoom; dragNode.y+=dy/zoom; reqDraw(); return; }
  if(isPanning){ panX+=dx/zoom; panY+=dy/zoom; reqDraw(); return; }
  var hit=hitTest(ev.offsetX,ev.offsetY);
  if(hit!==hoverNode){ hoverNode=hit; canvas.style.cursor=hit?"pointer":"default"; reqDraw(); }
});

canvas.addEventListener("mouseup",function(ev){
  if(isDragging&&dragNode&&!didMove) selectNode(dragNode);
  isDragging=false; isPanning=false; dragNode=null;
});

canvas.addEventListener("dblclick",function(ev){ if(!hitTest(ev.offsetX,ev.offsetY)) fitAll(); });

canvas.addEventListener("wheel",function(ev){
  ev.preventDefault();
  var factor=ev.deltaY>0?0.92:1.08, nz=Math.max(0.2,Math.min(4,zoom*factor));
  var w=screenToWorld(ev.offsetX,ev.offsetY);
  zoom=nz; panX=(ev.offsetX-W/2)/zoom-w[0]; panY=(ev.offsetY-H/2)/zoom-w[1];
  reqDraw();
},{passive:false});

var drawReq=false;
function reqDraw(){if(!drawReq){drawReq=true;requestAnimationFrame(function(){drawReq=false;draw();});}}

document.addEventListener("keydown",function(ev){
  if(ev.target.tagName==="INPUT") return;
  if(ev.key==="Escape"){closePanel();selectedNode=null;draw();}
  if(ev.key==="f"||ev.key==="F") fitAll();
  if(ev.key===" "){ev.preventDefault();panX=0;panY=0;zoom=1;draw();}
  if(ev.key>="1"&&ev.key<="9"){var idx=parseInt(ev.key)-1;if(idx<LAYERS.length)doToggleLayer(LAYERS[idx].key);}
});

function fitAll(){
  var vis=ENTITIES.filter(function(e){return layerVisible[e.layer];});
  if(!vis.length)return;
  var minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  vis.forEach(function(e){minX=Math.min(minX,e.x);minY=Math.min(minY,e.y);maxX=Math.max(maxX,e.x+e.w);maxY=Math.max(maxY,e.y+e.h);});
  var pw=maxX-minX+100,ph=maxY-minY+100;
  zoom=Math.min(W/pw,H/ph,2)*0.9; panX=-(minX+maxX)/2; panY=-(minY+maxY)/2; draw();
}

(function buildLeft(){
  var list=document.getElementById("layerList");
  LAYERS.forEach(function(l){
    var count=ENTITIES.filter(function(e){return e.layer===l.key;}).length;
    var li=document.createElement("li");
    li.className="layer-item"; li.dataset.layer=l.key;
    var dot=document.createElement("span"); dot.className="layer-dot"; dot.style.background=l.color;
    var name=document.createElement("span"); name.className="layer-name"; name.textContent=l.label;
    var cnt=document.createElement("span"); cnt.className="layer-count"; cnt.textContent=count;
    li.appendChild(dot); li.appendChild(name); li.appendChild(cnt);
    li.onclick=function(){doToggleLayer(l.key);};
    list.appendChild(li);
  });
})();

function doToggleLayer(key){
  layerVisible[key]=!layerVisible[key];
  document.querySelectorAll(".layer-item").forEach(function(li){
    if(li.dataset.layer===key) li.classList.toggle("off",!layerVisible[key]);
  });
  updateStats(); draw();
}

function updateStats(){
  var vis=ENTITIES.filter(function(e){return layerVisible[e.layer];}).length;
  var ec=EDGES.filter(function(ed){var a=entMap[ed.from],b=entMap[ed.to];return a&&b&&layerVisible[a.layer]&&layerVisible[b.layer];}).length;
  var tr=0; ENTITIES.forEach(function(e){tr+=e.csvRecords||0;});
  var h=document.getElementById("headerStats");
  h.textContent="";
  [[vis+"/"+ENTITIES.length+" entidades"],[ec+" edges"],[Object.keys(ENUMS).length+" enums"],[tr.toLocaleString("pt-BR")+" records"]].forEach(function(s){
    var sp=document.createElement("span"); sp.className="stat";
    var b=document.createElement("b"); b.textContent=s[0].split(" ")[0];
    sp.appendChild(b); sp.appendChild(document.createTextNode(" "+s[0].split(" ").slice(1).join(" ")));
    h.appendChild(sp);

function selectNode(ent){ selectedNode=ent; openPanel(ent); draw(); }

function openPanel(ent){

  // Build DOM safely

    var td2=document.createElement("td"); td2.textContent=c.type;
    var td3=document.createElement("td");
    if(c.pk){ var f=document.createElement("span"); f.className="flag flag-pk"; f.textContent="PK"; td3.appendChild(f); }

    if(c.en){ var f3=document.createElement("span"); f3.className="flag flag-enum"; f3.textContent="ENUM"; td3.appendChild(f3); }

    ent.outEdges.forEach(function(ed){

      rel.appendChild(arr); rel.appendChild(nm); rel.appendChild(col); inSec.appendChild(rel);
    });
    content.appendChild(inSec);
  }

  panel.classList.add("open");
}

function closePanel(){ document.getElementById("rightPanel").classList.remove("open"); selectedNode=null; draw(); }

function navigateTo(id){
  var ent=entMap[id]; if(!ent) return;
  if(!layerVisible[ent.layer]){ layerVisible[ent.layer]=true;
    document.querySelectorAll(".layer-item").forEach(function(li){if(li.dataset.layer===ent.layer) li.classList.remove("off");}); }
  selectedNode=ent;
  var tpx=-ent.x-ent.w/2, tpy=-ent.y-ent.h/2, spx=panX, spy=panY, sz=zoom, tz=Math.max(zoom,1.2);
  var st=performance.now(), dur=400;
  function anim(now){
    var t=Math.min((now-st)/dur,1), ease=t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    panX=spx+(tpx-spx)*ease; panY=spy+(tpy-spy)*ease; zoom=sz+(tz-sz)*ease; draw();
    if(t<1) requestAnimationFrame(anim); else openPanel(ent);
  }
  requestAnimationFrame(anim);
}
