<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepWork Business Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Print settings: Standard 3.5 x 2 inch card at 300 DPI */
        /* To simulate high res on screen, we scale everything up */
        :root {
            --card-width: 1050px;
            /* 3.5 inches * 300 dpi */
            --card-height: 600px;
            /* 2.0 inches * 300 dpi */
            --bg-dark: #003C46;
            /* Deep Teal from brand */
            --bg-light: #FFFFFF;
            --accent-green: #14AA82;
            --text-primary: #0A2540;
            --text-white: #FFFFFF;
        }

        body {
            margin: 0;
            padding: 20px;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            font-family: 'Montserrat', sans-serif;
        }

        .card-container {
            width: var(--card-width);
            height: var(--card-height);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            /* Ensure smooth scaling */
            -webkit-font-smoothing: antialiased;
        }

        /* FRONT DESIGN: Logo on Dark Teal Background */
        .card-front {
            background: radial-gradient(circle at center, #004d5a 0%, var(--bg-dark) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .card-front img.logo-mark {
            width: 180px;
            height: auto;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.2));
        }

        .card-front .logo-text-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: flex-start;
            /* Align text left relative to each other */
        }

        .card-front img.text-deepwork {
            height: 50px;
            width: auto;
            filter: brightness(0) invert(1);
            /* Make white */
        }

        .card-front img.text-aiflows {
            height: 25px;
            width: auto;
            /* Make vivid green to pop against dark background */
            filter: brightness(0) sepia(100%) saturate(1000%) hue-rotate(90deg) brightness(1.2);
        }


        /* BACK DESIGN: Minimal White with details */
        .card-back {
            background: var(--bg-light);
            display: grid;
            grid-template-columns: 1.2fr 2fr;
            padding: 0;
        }

        /* Left Accent Bar on Back */
        .back-accent {
            background: var(--bg-dark);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle pattern overlay */
        .back-accent::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1h2v2H1V1zm4 0h2v2H5V1zm4 0h2v2H9V1z' fill='%23ffffff' fill-opacity='0.05'/%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .back-accent img.logo-mark-small {
            width: 120px;
            height: auto;
            opacity: 0.9;
        }

        /* Right Content Area */
        .back-content {
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1.name {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 5px 0;
            letter-spacing: -0.5px;
        }

        .role {
            font-size: 24px;
            font-weight: 500;
            color: var(--accent-green);
            margin-bottom: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 24px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(20, 170, 130, 0.1);
            border-radius: 50%;
            color: var(--accent-green);
            flex-shrink: 0;
        }

        .icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .footer-url {
            margin-top: auto;
            font-size: 20px;
            color: #888;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <!-- CARD FRONT -->
    <div class="card-container card-front" id="card-front">
        <img src="../../frontend/assets/logo_mark.png" class="logo-mark" alt="Logo Mark">
        <div class="logo-text-group">
            <img src="../../frontend/assets/text_deepwork.png" class="text-deepwork" alt="DEEPWORK">
            <img src="../../frontend/assets/text_aiflows.png" class="text-aiflows" alt="AI FLOWS">
        </div>
    </div>

    <!-- CARD BACK -->
    <div class="card-container card-back" id="card-back">
        <div class="back-accent">
            <img src="../../frontend/assets/logo_mark.png" class="logo-mark-small" alt="Logo Detail">
        </div>
        <div class="back-content">
            <h1 class="name">Rodrigo Kugler</h1>
            <div class="role">Co-Founder & Sales</div>

            <div class="contact-info">
                <div class="contact-item">
                    <div class="icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" />
                        </svg>
                    </div>
                    <span>(42) 99911-0955</span>
                </div>
                <div class="contact-item">
                    <div class="icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
                        </svg>
                    </div>
                    <span>rodrigo@dpwai.com.br</span>
                </div>
                <div class="contact-item">
                    <div class="icon">
                        <svg viewBox="0 0 24 24">
                            <path
                                d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8 8 8z" />
                        </svg>
                    </div>
                    <span>dpwai.com.br</span>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
