<svg width="200" height="250" xmlns="http://www.w3.org/2000/svg">
  <!-- Símbolo no topo -->
  <g id="symbol" transform="translate(90, 20)">
    <!-- Camadas semicirculares (profundidade) -->
    <path d="M 20 60 Q 20 40, 40 40 Q 60 40, 60 60" stroke="#1E3A5F" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 30 60 Q 30 50, 45 50 Q 60 50, 60 60" stroke="#1E3A5F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 40 60 Q 40 55, 50 55 Q 60 55, 60 60" stroke="#1E3A5F" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Linhas fluidas (fluxo) -->
    <line x1="60" y1="60" x2="80" y2="50" stroke="#4A90E2" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="80" y2="60" stroke="#4A90E2" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="80" y2="70" stroke="#4A90E2" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Continuidade do fluxo -->
    <path d="M 80 50 Q 100 45, 120 50" stroke="#4A90E2" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 80 60 Q 100 60, 120 60" stroke="#4A90E2" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 70 Q 100 75, 120 70" stroke="#4A90E2" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Texto abaixo -->
  <g id="text" transform="translate(0, 140)">
    <text x="100" y="30" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#1E3A5F" text-anchor="middle">Deepwork</text>
    <text x="100" y="60" font-family="Inter, sans-serif" font-size="18" font-weight="400" fill="#4A90E2" text-anchor="middle">AI Flows</text>
  </g>
</svg>



