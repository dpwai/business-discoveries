<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003C46;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14AA82;stop-opacity:1" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;display=swap');
      .text-title { font-family: 'Montserrat', sans-serif; font-weight: 700; fill: #003C46; }
      .text-subtitle { font-family: 'Montserrat', sans-serif; font-weight: 400; fill: #487A7B; } /* Slightly lighter teal */
    </style>
  </defs>

  <!-- Icon Group -->
  <g transform="translate(50, 40) scale(1.5)">
    <!-- 
      Recreating the stylized "Hand/Chart" shape:
      Consists of 3-4 rising bent lines/pillars representing data flow/growth.
      Based on "DeepWork" 'W' or graph concept.
    -->
    
    <!-- Path 1 (Left/Bottom) - Darker part of gradient -->
    <path d="M 10 50 L 25 65 L 70 20" 
          fill="none" 
          stroke="url(#mainGradient)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.9"/>
          
    <!-- Path 2 (Middle) -->
     <path d="M 10 30 L 25 45 L 80 15" 
          fill="none" 
          stroke="url(#mainGradient)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          opacity="0.95"/>
          
    <!-- Path 3 (Right/Top) -->
     <path d="M 25 10 L 85 10" 
          fill="none" 
          stroke="url(#mainGradient)" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
          
    <!-- 
      Refining to be closer to the "U" shape description if needed.
      Let's try to match the "4 vertical bars rising" description better.
      A "U" shape formed by lines.
    -->
  </g>
  
  <!-- Alternative Icon Construction (Layered Geometric Lines) -->
  <!-- Overwriting previous G to match the uploaded image "W" shape better -->
  <rect width="600" height="200" fill="white" fill-opacity="0"/>
  
  <g transform="translate(40, 25) scale(1.6)">
      <!-- The shape is like a stylized 'W' or hand made of 3 distinct bent bars -->
      <!-- Bar 1 (Leftmost, lowest) -->
      <path d="M 15 45 Q 15 65 35 65 L 45 65 L 45 35" 
            fill="none" stroke="url(#mainGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
            
      <!-- Bar 2 (Middle) -->
      <path d="M 30 75 Q 30 45 60 45 L 60 15" 
             fill="none" stroke="url(#mainGradient)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,0)"/>
      
      <!-- Let's actually construct 3 "L" shapes nested -->
      
      <!-- Shape 1 (Bottom-Left Loop) -->
      <path d="M 10 40 L 10 60 L 30 70 L 50 60" 
            fill="none" stroke="#003C46" stroke-width="0" /> <!-- Guide -->

      <!-- Real Attempt at the specific Logo Shape:
           It looks like 3 vertical pillars connected by a diagonal base. 
      -->
      <path d="M 15 60 L 35 75 L 85 25" fill="none" stroke="url(#mainGradient)" stroke-width="12" stroke-linecap="square" />
      <path d="M 15 35 L 35 50 L 65 20" fill="none" stroke="url(#mainGradient)" stroke-width="12" stroke-linecap="square" />
      <path d="M 15 10 L 30 25" fill="none" stroke="url(#mainGradient)" stroke-width="12" stroke-linecap="square" />
  </g>

  <!-- Final Polished Icon Geometry (Replacing guess work with clean lines) -->
   <rect x="0" y="0" width="180" height="200" fill="#F9FAFB" rx="10" opacity="0"/> <!-- Clear area -->
  
   <g transform="translate(60, 35) scale(1.1)">
      <!-- This geometry mimics the prompt description: "stylized hand or growing chart" -->
      <!-- Gradient Definition -->
      <!-- Using strokes to create the lines -->
      
      <!-- Line 1: The 'thumb' or shortest bar -->
      <path d="M 10 50 L 25 60 L 25 30" fill="none" stroke="url(#mainGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Line 2: The index finger -->
      <path d="M 35 70 L 50 80 L 50 15" fill="none" stroke="url(#mainGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Line 3: The middle finger -->
      <path d="M 60 70 L 75 60 L 75 0" fill="none" stroke="url(#mainGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      
      <!-- Base Connector curve? -->
      <!-- Let's stick to the diagonal rising lines which is a common tech logo pattern -->
      <path d="M 10 60 L 35 75 L 80 30" stroke="url(#mainGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M 10 35 L 35 50 L 60 25" stroke="url(#mainGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
   </g>


  <!-- Text -->
  <text x="180" y="105" class="text-title" font-size="64" letter-spacing="-1">DEEPWORK</text>
  <text x="184" y="145" class="text-subtitle" font-size="32" letter-spacing="4">AI FLOWS</text>
</svg>
