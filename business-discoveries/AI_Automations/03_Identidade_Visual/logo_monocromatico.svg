<svg width="400" height="120" xmlns="http://www.w3.org/2000/svg">
  <!-- Versão monocromática (preto) -->
  <g id="symbol">
    <!-- Camadas semicirculares (profundidade) -->
    <path d="M 20 60 Q 20 40, 40 40 Q 60 40, 60 60" stroke="#000000" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 30 60 Q 30 50, 45 50 Q 60 50, 60 60" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 40 60 Q 40 55, 50 55 Q 60 55, 60 60" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Linhas fluidas (fluxo) -->
    <line x1="60" y1="60" x2="80" y2="50" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="80" y2="60" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="60" y1="60" x2="80" y2="70" stroke="#000000" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Continuidade do fluxo -->
    <path d="M 80 50 Q 100 45, 120 50" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M 80 60 Q 100 60, 120 60" stroke="#000000" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 80 70 Q 100 75, 120 70" stroke="#000000" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Texto: Deepwork AI Flows -->
  <g id="text">
    <text x="140" y="50" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#000000">Deepwork</text>
    <text x="140" y="80" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#000000">AI Flows</text>
  </g>
</svg>



