<svg width="120" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Ícone isolado: Camadas que se transformam em linhas fluidas -->
  
  <!-- Camadas semicirculares (profundidade) -->
  <path d="M 20 60 Q 20 30, 50 30 Q 80 30, 80 60" stroke="#1E3A5F" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 30 60 Q 30 45, 50 45 Q 70 45, 70 60" stroke="#1E3A5F" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 40 60 Q 40 52, 50 52 Q 60 52, 60 60" stroke="#1E3A5F" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Linhas fluidas (fluxo) -->
  <line x1="80" y1="60" x2="100" y2="45" stroke="#4A90E2" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="80" y1="60" x2="100" y2="60" stroke="#4A90E2" stroke-width="4" stroke-linecap="round"/>
  <line x1="80" y1="60" x2="100" y2="75" stroke="#4A90E2" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Continuidade do fluxo -->
  <path d="M 100 45 Q 110 40, 120 45" stroke="#4A90E2" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100 60 Q 110 60, 120 60" stroke="#4A90E2" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 100 75 Q 110 80, 120 75" stroke="#4A90E2" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>



